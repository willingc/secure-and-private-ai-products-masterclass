services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../:/app:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLAMAFILE_HOST=http://llamafile:8080
    networks:
      - dev-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - dev-network
    # Uncomment if you have a GPU and are running docker compose locally:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  llamafile:
    build:
      context: .
      dockerfile: Dockerfile.llamafile
    volumes:
      - llamafile-data:/models
    ports:
      - "8080:8080"
    networks:
      - dev-network

volumes:
  ollama-data:
  llamafile-data:

networks:
  dev-network:
    driver: bridge
